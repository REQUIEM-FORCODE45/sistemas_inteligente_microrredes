server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Configuración para el Frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Caché para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 3. EL TRUCO MAGICO: Reverse Proxy para tu Backend
    location /api/ {
        # Si tu backend corre en tu PC en el puerto 3000 (fuera de Docker):
        # Usa host.docker.internal en Windows/Mac, o la IP de tu PC en Linux.
        proxy_pass http://host.docker.internal:3000; 
        
        # Configuraciones estándar para no perder la info original del cliente
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}